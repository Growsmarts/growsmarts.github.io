<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Cedar Hollow Organics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Cedar Hollow Organics</h1>
    <nav>
      <button class="menu-toggle" aria-label="Menu">&#9776;</button>
      <ul class="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="csa.html">CSA</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="contact-hero">
    <h2>Contact Us</h2>
  </section>

  <section class="contact-form">
    <p>We love hearing from our community! Send us a message below, and we’ll get back to you soon.</p>
    <form>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="button">Send Message</button>
    </form>
  </section>

  <footer>
    <p>© 2026 Cedar Hollow Organics | Polk County, FL | 
      <a href="mailto:info@cedarholloworganics.com">info@cedarholloworganics.com</a>
    </p>
  </footer>

  <script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navList = document.querySelector('.nav-list');
    menuToggle.addEventListener('click', () => {
      navList.classList.toggle('show');
    });
  </script>
</body>
</html>
